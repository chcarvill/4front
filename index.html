<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#534AB7" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#1a1a18" media="(prefers-color-scheme: dark)" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Forefront" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>Forefront</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f9f7;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-hover: rgba(0,0,0,0.2);
    --text: #1a1a18;
    --text-secondary: #6b6b67;
    --text-hint: #aaa9a3;
    --radius: 10px;
    --radius-sm: 6px;
    --accent-career: #534AB7;
    --accent-daily: #0F6E56;
    --success: #1D9E75;
    --success-bg: #E1F5EE;
    --danger: #E24B4A;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --border: rgba(255,255,255,0.1);
      --border-hover: rgba(255,255,255,0.2);
      --text: #f0efe8;
      --text-secondary: #9e9d97;
      --text-hint: #5a5a57;
      --accent-career: #7F77DD;
      --accent-daily: #5DCAA5;
      --success: #5DCAA5;
      --success-bg: #04342C;
      --danger: #F09595;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 3rem 1.5rem 4rem;
  }

  h1 { font-size: 22px; font-weight: 500; text-align: center; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: var(--text-secondary); text-align: center; margin-bottom: 2.5rem; }

  .columns {
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    gap: 0 2.5rem;
    max-width: 1020px;
    margin: 0 auto;
  }

  @media (max-width: 680px) {
    .columns { grid-template-columns: 1fr; gap: 2.5rem 0; }
    .divider { display: none; }
  }

  .divider { background: var(--border); }
  .col { min-width: 0; }

  .col-header { display: flex; align-items: center; gap: 9px; margin-bottom: 1.25rem; }
  .col-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .career .col-dot { background: var(--accent-career); }
  .daily  .col-dot { background: var(--accent-daily); }
  .col-header h2 { font-size: 16px; font-weight: 500; }

  .stats { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .stat {
    flex: 1; background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 10px 12px;
  }
  .stat-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 2px; }
  .stat-value { font-size: 20px; font-weight: 500; }

  .section-label {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text-hint); margin-bottom: 7px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .section-label span { font-size: 11px; color: var(--text-hint); }

  .task-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 1.25rem; }

  .task-card {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 12px;
    transition: border-color 0.15s, opacity 0.2s;
  }

  .task-card.prefilled { border-style: dashed; }
  .task-card:hover { border-color: var(--border-hover); }
  .task-card.done { opacity: 0.42; }

  .check-btn {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid var(--border-hover);
    background: transparent; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--success);
    transition: background 0.15s, border-color 0.15s;
  }
  .task-card.done .check-btn { background: var(--success-bg); border-color: var(--success); }
  .check-btn:hover { border-color: var(--success); }

  .task-text {
    flex: 1; font-size: 14px; line-height: 1.4;
    color: var(--text); cursor: text;
    min-width: 0; word-break: break-word;
  }
  .task-card.done .task-text { text-decoration: line-through; color: var(--text-secondary); }

  .task-text-input {
    flex: 1; font-size: 14px; line-height: 1.4;
    color: var(--text); background: transparent;
    border: none; outline: none;
    border-bottom: 1px solid var(--border-hover);
    padding: 0; font-family: inherit; min-width: 0;
  }

  .prefilled-hint {
    font-size: 11px; color: var(--text-hint);
    flex-shrink: 0; margin-right: 2px;
    cursor: default; user-select: none;
  }

  .priority-badge {
    font-size: 11px; padding: 2px 7px;
    border-radius: 20px; font-weight: 500; flex-shrink: 0;
  }
  .priority-high { background: #FCEBEB; color: #A32D2D; }
  .priority-med  { background: #FAEEDA; color: #633806; }
  .priority-low  { background: #EAF3DE; color: #27500A; }
  @media (prefers-color-scheme: dark) {
    .priority-high { background: #501313; color: #F09595; }
    .priority-med  { background: #412402; color: #FAC775; }
    .priority-low  { background: #173404; color: #C0DD97; }
  }

  .del-btn {
    width: 22px; height: 22px; border-radius: var(--radius-sm);
    border: none; background: transparent;
    color: var(--text-hint); font-size: 13px;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  .del-btn:hover { background: #FCEBEB; color: #A32D2D; }
  @media (prefers-color-scheme: dark) { .del-btn:hover { background: #501313; color: #F09595; } }

  .add-row { display: flex; gap: 8px; margin-bottom: 0.75rem; }

  input[type="text"] {
    flex: 1; height: 38px;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text);
    font-size: 14px; padding: 0 11px; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input[type="text"]::placeholder { color: var(--text-hint); }
  .career input[type="text"]:focus {
    border-color: var(--accent-career);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent-career) 14%, transparent);
  }
  .daily input[type="text"]:focus {
    border-color: var(--accent-daily);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent-daily) 14%, transparent);
  }

  .add-btn {
    height: 38px; padding: 0 14px;
    border-radius: var(--radius-sm);
    border: none; color: #fff;
    font-size: 13px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
    transition: opacity 0.15s;
  }
  .career .add-btn { background: var(--accent-career); }
  .daily  .add-btn { background: var(--accent-daily); }
  .add-btn:hover { opacity: 0.85; }
  .add-btn:active { opacity: 0.7; transform: scale(0.98); }
  .add-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .priority-row {
    display: flex; gap: 5px; margin-bottom: 1.5rem;
    align-items: center; flex-wrap: wrap;
  }
  .priority-row > span { font-size: 12px; color: var(--text-hint); margin-right: 2px; }
  .priority-row button {
    padding: 4px 10px; border-radius: 20px;
    border: 0.5px solid var(--border-hover);
    background: transparent; color: var(--text-secondary);
    font-size: 12px; cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  .active-high { background: #FCEBEB !important; color: #A32D2D !important; border-color: #F09595 !important; }
  .active-med  { background: #FAEEDA !important; color: #633806 !important; border-color: #FAC775 !important; }
  .active-low  { background: #EAF3DE !important; color: #27500A !important; border-color: #C0DD97 !important; }
  @media (prefers-color-scheme: dark) {
    .active-high { background: #501313 !important; color: #F09595 !important; border-color: #A32D2D !important; }
    .active-med  { background: #412402 !important; color: #FAC775 !important; border-color: #854F0B !important; }
    .active-low  { background: #173404 !important; color: #C0DD97 !important; border-color: #3B6D11 !important; }
  }

  .empty { text-align: center; padding: 1.25rem 0; color: var(--text-hint); font-size: 13px; }

  .clear-done {
    font-size: 12px; color: var(--text-hint);
    background: none; border: none; cursor: pointer;
    padding: 2px 0; text-decoration: underline;
    text-underline-offset: 3px; display: block;
    margin-top: -0.5rem; margin-bottom: 1.25rem;
  }
  .clear-done:hover { color: var(--danger); }

  .sep { height: 1px; background: var(--border); margin: 1.25rem 0; }

  #install-banner {
    display: none;
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text-secondary);
    gap: 12px;
    align-items: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    white-space: nowrap;
    z-index: 100;
  }

  #install-banner.visible { display: flex; }

  #install-banner button {
    padding: 5px 12px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--accent-career);
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
  }

  #install-banner .dismiss {
    background: transparent;
    color: var(--text-hint);
    padding: 5px 6px;
  }
</style>
</head>
<body>

<h1>Forefront</h1>
<p class="subtitle">Your tasks, always visible.</p>

<div class="columns">
  <div id="col-career" class="col career"></div>
  <div class="divider"></div>
  <div id="col-daily"  class="col daily"></div>
</div>

<div id="install-banner">
  <span>Install Forefront as an app?</span>
  <button id="install-btn">Install</button>
  <button class="dismiss" id="dismiss-btn">✕</button>
</div>

<script>
const SECTIONS = [
  { id: 'career', label: 'Career', colId: 'col-career' },
  { id: 'daily',  label: 'Daily',  colId: 'col-daily'  }
];

const MAX = 10;
const priorityOrder = { high: 0, med: 1, low: 2 };
const priorityLabel = { high: 'High', med: 'Medium', low: 'Low' };
const state = {};

function today() { return new Date().toDateString(); }

function loadSection(id) {
  const raw = JSON.parse(localStorage.getItem('forefront3_' + id) || 'null');
  if (raw) {
    const prefilled = (raw.prefilled || []).map(t => ({
      ...t,
      done: raw.date === today() ? t.done : false
    }));
    const daily = raw.date === today() ? (raw.daily || []) : [];
    state[id] = { prefilled, daily, priority: raw.priority || 'high' };
  } else {
    state[id] = { prefilled: [], daily: [], priority: 'high' };
  }
}

function saveSection(id) {
  localStorage.setItem('forefront3_' + id, JSON.stringify({
    date: today(),
    prefilled: state[id].prefilled,
    daily: state[id].daily,
    priority: state[id].priority
  }));
}

function setPriority(id, p) {
  state[id].priority = p;
  ['high','med','low'].forEach(x => {
    document.getElementById(id + '-btn-' + x).className = x === p ? 'active-' + x : '';
  });
}

function addPrefilled(id) {
  if (state[id].prefilled.length >= MAX) return;
  const input = document.getElementById(id + '-pre-input');
  const text = input.value.trim();
  if (!text) return;
  state[id].prefilled.push({ id: Date.now(), text, done: false, priority: state[id].priority });
  input.value = '';
  saveSection(id);
  renderSection(id);
}

function addDaily(id) {
  if (state[id].daily.length >= MAX) return;
  const input = document.getElementById(id + '-day-input');
  const text = input.value.trim();
  if (!text) return;
  state[id].daily.unshift({ id: Date.now(), text, done: false, priority: state[id].priority });
  input.value = '';
  saveSection(id);
  renderSection(id);
}

function toggleTask(sid, group, tid) {
  const t = state[sid][group].find(t => t.id === tid);
  if (t) t.done = !t.done;
  saveSection(sid);
  renderSection(sid);
}

function removeTask(sid, group, tid) {
  state[sid][group] = state[sid][group].filter(t => t.id !== tid);
  saveSection(sid);
  renderSection(sid);
}

function clearDone(id) {
  state[id].daily = state[id].daily.filter(t => !t.done);
  saveSection(id);
  renderSection(id);
}

function startEdit(sid, tid, spanEl) {
  const t = state[sid].prefilled.find(t => t.id === tid);
  if (!t) return;
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.value = t.text;
  inp.className = 'task-text-input';
  spanEl.replaceWith(inp);
  inp.focus();
  inp.select();

  function commit() {
    const val = inp.value.trim();
    if (val) t.text = val;
    saveSection(sid);
    renderSection(sid);
  }

  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') inp.blur();
    if (e.key === 'Escape') { inp.value = t.text; inp.blur(); }
  });
}

function makeCard(sid, group, t) {
  const card = document.createElement('div');
  card.className = 'task-card' + (group === 'prefilled' ? ' prefilled' : '') + (t.done ? ' done' : '');

  const check = document.createElement('button');
  check.className = 'check-btn';
  check.innerHTML = t.done ? '&#10003;' : '';
  check.onclick = () => toggleTask(sid, group, t.id);
  card.appendChild(check);

  if (group === 'prefilled') {
    const hint = document.createElement('span');
    hint.className = 'prefilled-hint';
    hint.title = 'Click text to edit';
    hint.textContent = '✎';
    card.appendChild(hint);
  }

  const label = document.createElement('span');
  label.className = 'task-text';
  label.textContent = t.text;
  if (group === 'prefilled' && !t.done) {
    label.title = 'Click to edit';
    label.onclick = () => startEdit(sid, t.id, label);
  }
  card.appendChild(label);

  const badge = document.createElement('span');
  badge.className = 'priority-badge priority-' + t.priority;
  badge.textContent = priorityLabel[t.priority];
  card.appendChild(badge);

  const del = document.createElement('button');
  del.className = 'del-btn';
  del.innerHTML = '&#10005;';
  del.title = 'Remove';
  del.onclick = () => removeTask(sid, group, t.id);
  card.appendChild(del);

  return card;
}

function renderSection(id) {
  const { prefilled, daily } = state[id];

  const preActive = prefilled.filter(t => !t.done).sort((a,b) => priorityOrder[a.priority] - priorityOrder[b.priority]);
  const preDone   = prefilled.filter(t => t.done);
  const dayActive = daily.filter(t => !t.done).sort((a,b) => priorityOrder[a.priority] - priorityOrder[b.priority]);
  const dayDone   = daily.filter(t => t.done);

  document.getElementById(id + '-stat-remaining').textContent = preActive.length + dayActive.length;
  document.getElementById(id + '-stat-done').textContent = preDone.length + dayDone.length;

  const preList = document.getElementById(id + '-pre-list');
  preList.innerHTML = '';
  [...preActive, ...preDone].forEach(t => preList.appendChild(makeCard(id, 'prefilled', t)));
  document.getElementById(id + '-pre-empty').style.display = prefilled.length === 0 ? 'block' : 'none';
  document.getElementById(id + '-pre-count').textContent = prefilled.length + '/' + MAX;

  const atPreMax = prefilled.length >= MAX;
  document.getElementById(id + '-pre-add-btn').disabled = atPreMax;
  const preInput = document.getElementById(id + '-pre-input');
  preInput.disabled = atPreMax;
  preInput.placeholder = atPreMax ? 'Maximum reached' : 'Add a standing task...';

  const dayList = document.getElementById(id + '-day-list');
  dayList.innerHTML = '';
  [...dayActive, ...dayDone].forEach(t => dayList.appendChild(makeCard(id, 'daily', t)));
  document.getElementById(id + '-day-empty').style.display = daily.length === 0 ? 'block' : 'none';
  document.getElementById(id + '-day-count').textContent = daily.length + '/' + MAX;

  const atDayMax = daily.length >= MAX;
  document.getElementById(id + '-day-add-btn').disabled = atDayMax;
  const dayInput = document.getElementById(id + '-day-input');
  dayInput.disabled = atDayMax;
  dayInput.placeholder = atDayMax ? 'Maximum reached' : "Add today's task...";

  document.getElementById(id + '-clear').style.display = dayDone.length > 0 ? 'block' : 'none';
}

function buildSection(id, label, colId) {
  document.getElementById(colId).innerHTML = `
    <div class="col-header">
      <div class="col-dot"></div>
      <h2>${label}</h2>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Remaining</div>
        <div class="stat-value" id="${id}-stat-remaining">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Completed today</div>
        <div class="stat-value" id="${id}-stat-done">0</div>
      </div>
    </div>
    <div class="priority-row">
      <span>Priority:</span>
      <button id="${id}-btn-high" onclick="setPriority('${id}','high')">High</button>
      <button id="${id}-btn-med"  onclick="setPriority('${id}','med')">Medium</button>
      <button id="${id}-btn-low"  onclick="setPriority('${id}','low')">Low</button>
    </div>
    <div class="section-label">
      Standing tasks
      <span id="${id}-pre-count">0/${MAX}</span>
    </div>
    <div class="task-list" id="${id}-pre-list"></div>
    <div class="empty" id="${id}-pre-empty" style="display:none">No standing tasks yet.</div>
    <div class="add-row">
      <input type="text" id="${id}-pre-input" placeholder="Add a standing task..." />
      <button class="add-btn" id="${id}-pre-add-btn" onclick="addPrefilled('${id}')">Add</button>
    </div>
    <div class="sep"></div>
    <div class="section-label">
      Today's tasks
      <span id="${id}-day-count">0/${MAX}</span>
    </div>
    <div class="task-list" id="${id}-day-list"></div>
    <div class="empty" id="${id}-day-empty" style="display:none">No tasks added today.</div>
    <div class="add-row">
      <input type="text" id="${id}-day-input" placeholder="Add today's task..." />
      <button class="add-btn" id="${id}-day-add-btn" onclick="addDaily('${id}')">Add</button>
    </div>
    <button class="clear-done" id="${id}-clear" onclick="clearDone('${id}')" style="display:none">Clear completed today</button>
  `;

  document.getElementById(id + '-pre-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addPrefilled(id);
  });
  document.getElementById(id + '-day-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addDaily(id);
  });

  setPriority(id, state[id].priority);
}

SECTIONS.forEach(s => {
  loadSection(s.id);
  buildSection(s.id, s.label, s.colId);
  renderSection(s.id);
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

let deferredPrompt = null;
const banner = document.getElementById('install-banner');
const installBtn = document.getElementById('install-btn');
const dismissBtn = document.getElementById('dismiss-btn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  banner.classList.add('visible');
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  banner.classList.remove('visible');
});

dismissBtn.addEventListener('click', () => {
  banner.classList.remove('visible');
});

window.addEventListener('appinstalled', () => {
  banner.classList.remove('visible');
});
</script>
</body>
</html>
